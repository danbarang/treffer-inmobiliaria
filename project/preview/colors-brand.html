<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-canvas); font-family: var(--font-body); padding: 20px; box-sizing: border-box; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .swatch { border-radius: var(--radius-sm); overflow: hidden; flex: 1; min-width: 100px; box-shadow: var(--shadow-sm); }
  .swatch-color { height: 72px; }
  .swatch-info { background: white; padding: 8px 10px; }
  .swatch-name { font-size: 11px; font-weight: 600; color: #333; }
  .swatch-hex { font-size: 11px; color: #888; font-family: monospace; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch">
    <div class="swatch-color" style="background:#2B6F72"></div>
    <div class="swatch-info"><div class="swatch-name">Primary Teal</div><div class="swatch-hex">#2B6F72</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#1E5255"></div>
    <div class="swatch-info"><div class="swatch-name">Primary Dark</div><div class="swatch-hex">#1E5255</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#3D8C90"></div>
    <div class="swatch-info"><div class="swatch-name">Primary Light</div><div class="swatch-hex">#3D8C90</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#C4DCDD"></div>
    <div class="swatch-info"><div class="swatch-name">Primary Muted</div><div class="swatch-hex">#C4DCDD</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#EBF4F5"></div>
    <div class="swatch-info"><div class="swatch-name">Primary Subtle</div><div class="swatch-hex">#EBF4F5</div></div>
  </div>
</div>
</body>
</html>
