<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-canvas); font-family: var(--font-body); padding: 20px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .chip { display: flex; align-items: center; gap: 10px; background: white; border-radius: var(--radius-sm); padding: 10px 14px; box-shadow: var(--shadow-sm); flex: 1; min-width: 140px; }
  .dot { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; }
  .chip-name { font-size: 12px; font-weight: 600; color: #333; }
  .chip-hex { font-size: 11px; color: #888; font-family: monospace; }
  .pill { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 4px 12px; font-size: 12px; font-weight: 600; }
  .pill-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
</style>
</head>
<body>
<div class="row">
  <div class="chip"><div class="dot" style="background:#2A7D5A"></div><div><div class="chip-name">Success</div><div class="chip-hex">#2A7D5A</div></div></div>
  <div class="chip"><div class="dot" style="background:#A05C1A"></div><div><div class="chip-name">Warning</div><div class="chip-hex">#A05C1A</div></div></div>
  <div class="chip"><div class="dot" style="background:#B33A2A"></div><div><div class="chip-name">Error</div><div class="chip-hex">#B33A2A</div></div></div>
  <div class="chip"><div class="dot" style="background:#B8860B"></div><div><div class="chip-name">Star Rating</div><div class="chip-hex">#B8860B</div></div></div>
</div>
<div class="pill-row">
  <span class="pill" style="background:#E6F4EE; color:#2A7D5A;">Disponible</span>
  <span class="pill" style="background:#FDF0E0; color:#A05C1A;">Reservado</span>
  <span class="pill" style="background:#FAEAE7; color:#B33A2A;">Vendido</span>
  <span class="pill" style="background:#EBF4F5; color:#2B6F72;">Nuevo</span>
</div>
</body>
</html>
