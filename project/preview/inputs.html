<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-canvas); padding: 20px; font-family: var(--font-body); }
  .label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-muted-soft); margin-bottom: 8px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 16px; }
  .field { display: flex; flex-direction: column; gap: 5px; min-width: 180px; flex: 1; }
  .field-label { font-size: 12px; font-weight: 500; color: var(--color-muted); }
  .field input, .field select { width: 100%; box-sizing: border-box; background: white; border: 1.5px solid var(--color-hairline); border-radius: var(--radius-sm); padding: 12px 14px; font-family: var(--font-body); font-size: 15px; color: var(--color-ink); outline: none; transition: border-color 150ms; }
  .field input:focus, .field select:focus { border-color: var(--color-primary); }
  .field input.error { border-color: var(--color-error); }
  .field .help { font-size: 11px; color: var(--color-muted); }
  .field .err-msg { font-size: 11px; color: var(--color-error); }
  textarea { width: 100%; box-sizing: border-box; background: white; border: 1.5px solid var(--color-hairline); border-radius: var(--radius-sm); padding: 12px 14px; font-family: var(--font-body); font-size: 15px; color: var(--color-ink); outline: none; resize: vertical; min-height: 80px; }
</style>
</head>
<body>
<div class="label">Text Inputs</div>
<div class="row">
  <div class="field">
    <div class="field-label">Nombre completo</div>
    <input type="text" placeholder="Ej: María González">
    <div class="help">Tal como aparece en el contrato</div>
  </div>
  <div class="field">
    <div class="field-label">Correo electrónico</div>
    <input type="email" value="maria@email.com" style="border-color:var(--color-primary)">
  </div>
  <div class="field">
    <div class="field-label">Teléfono</div>
    <input type="tel" class="error" placeholder="+56 9 1234 5678">
    <div class="err-msg">Número inválido</div>
  </div>
</div>

<div class="label">Select & Textarea</div>
<div class="row">
  <div class="field">
    <div class="field-label">Tipo de propiedad</div>
    <select>
      <option>Departamento</option>
      <option>Casa</option>
      <option>Oficina</option>
    </select>
  </div>
  <div class="field" style="flex:2">
    <div class="field-label">Mensaje</div>
    <textarea placeholder="Estoy interesado en coordinar una visita..."></textarea>
  </div>
</div>

<div class="label">Search Bar</div>
<div style="background:white;border:1.5px solid var(--color-hairline);border-radius:var(--radius-full);padding:10px 20px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-card);max-width:500px">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B6B6B" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <input type="text" placeholder="Buscar por ciudad, comuna o dirección…" style="border:none;outline:none;font-family:var(--font-body);font-size:15px;color:var(--color-ink);flex:1;padding:0;background:transparent">
  <button style="background:var(--color-primary);color:white;border:none;border-radius:var(--radius-full);padding:8px 20px;font-family:var(--font-body);font-size:14px;font-weight:500;cursor:pointer">Buscar</button>
</div>
</body>
</html>
