<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treffer Inmobiliaria</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #2B6F72; --primary-dark: #1E5255; --primary-light: #3D8C90;
  --primary-muted: #C4DCDD; --primary-subtle: #EBF4F5;
  --canvas: #EAE6D9; --card: #FFFFFF; --soft: #F4F1EA; --strong: #DEDAD0;
  --ink: #333333; --body: #4A4A4A; --muted: #6B6B6B; --muted-soft: #9A9A9A;
  --hairline: #D5D0C4; --hairline-soft: #E2DED5;
  --star: #B8860B;
  --shadow-card: 0 2px 8px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
  --shadow-hover: 0 8px 24px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04);
  --font-display: 'Helvetica Inserat', 'Helvetica Black', 'Helvetica', Arial, sans-serif;
  --font-serif: 'Helvetica Rounded', 'Helvetica', Arial, sans-serif;
  --font-body: 'Helvetica', Arial, sans-serif;
  --r-sm: 8px; --r-md: 12px; --r-lg: 20px; --r-full: 9999px;
  --transition: 200ms ease-out;
}
body { font-family: var(--font-body); background: var(--canvas); color: var(--ink); overflow-x: hidden; }
button { cursor: pointer; font-family: var(--font-body); border: none; }
a { text-decoration: none; color: inherit; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 32px; width: 100%; }
.grid-4 { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }
.grid-services { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 24px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ── Icons (inline SVG helpers) ─────────────────────── */
const Icon = ({ name, size=18, color="currentColor", strokeWidth=1.8 }) => {
  const paths = {
    home: <><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
    search: <><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></>,
    heart: <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>,
    'heart-filled': <path fill={color} d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>,
    'map-pin': <><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></>,
    key: <><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></>,
    camera: <><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></>,
    phone: <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 12 19.79 19.79 0 0 1 1.07 3.38 2 2 0 0 1 3.04 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21 15h1a2 2 0 0 1 .07.92 19.8 19.8 0 0 1-.07 1z"/>,
    menu: <><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></>,
    'arrow-right': <><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>,
    star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>,
    video: <><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></>,
    maximize: <><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></>,
    x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
    'chevron-down': <polyline points="6 9 12 15 18 9"/>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
      {paths[name]}
    </svg>
  );
};

/* ── Top Navigation ─────────────────────────────────── */
const Nav = ({ onNavigate, currentPage }) => {
  const [menuOpen, setMenuOpen] = React.useState(false);
  return (
    <nav style={{background:'white', borderBottom:`1px solid var(--hairline)`, position:'sticky', top:0, zIndex:100}}>
      <div style={{maxWidth:1200, margin:'0 auto', padding:'0 16px', height:72, width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
        {/* Logo */}
        <div style={{display:'flex', alignItems:'center', gap:10, cursor:'pointer'}} onClick={() => onNavigate('home')}>
          <img src="../../assets/Treffer-logo-type.png" alt="Treffer" style={{height:40}} />
        </div>
        {/* Nav Links */}
        <div style={{display:'flex', gap:8, alignItems:'center'}}>
          {[['Propiedades','listings'],['Arriendo','listings'],['Venta','listings'],['Nosotros','about']].map(([label, page]) => (
            <button key={label} onClick={() => onNavigate(page)} style={{background:'none', border:'none', padding:'8px 14px', fontFamily:'var(--font-body)', fontSize:15, fontWeight:500, color: currentPage===page ? 'var(--primary)' : 'var(--ink)', borderRadius:'var(--r-sm)', cursor:'pointer', transition:'var(--transition)'}}>
              {label}
            </button>
          ))}
        </div>
        {/* Right side */}
        <div style={{display:'flex', gap:10, alignItems:'center'}}>
          <button onClick={() => onNavigate('contact')} style={{background:'none', border:'1.5px solid var(--hairline)', padding:'8px 18px', borderRadius:'var(--r-full)', fontFamily:'var(--font-body)', fontSize:14, fontWeight:500, color:'var(--ink)', transition:'var(--transition)'}}>
            Contacto
          </button>
          <button onClick={() => onNavigate('publish')} style={{background:'var(--primary)', color:'white', border:'none', padding:'9px 20px', borderRadius:'var(--r-full)', fontFamily:'var(--font-body)', fontSize:14, fontWeight:500, transition:'var(--transition)'}}>
            Publicar propiedad
          </button>
        </div>
      </div>
    </nav>
  );
};

/* ── Property Card ───────────────────────────────────── */
const PropertyCard = ({ prop, onClick }) => {
  const [saved, setSaved] = React.useState(false);
  const [hovered, setHovered] = React.useState(false);
  return (
    <div onClick={onClick} onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
      style={{background:'white', borderRadius:'var(--r-md)', boxShadow: hovered ? 'var(--shadow-hover)' : 'var(--shadow-card)', overflow:'hidden', cursor:'pointer', transition:'box-shadow var(--transition), transform var(--transition)', transform: hovered ? 'translateY(-3px)' : 'none', flex:'0 0 auto', width:'100%'}}>
      {/* Photo */}
      <div style={{position:'relative', paddingTop:'66%', background:`linear-gradient(135deg, ${prop.color1} 0%, ${prop.color2} 100%)`}}>
        <div style={{position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center'}}>
          <Icon name="home" size={40} color="rgba(255,255,255,0.4)" />
        </div>
        <div style={{position:'absolute', inset:0, background:'linear-gradient(to top, rgba(0,0,0,0.2) 0%, transparent 60%)'}}></div>
        {/* Badge */}
        <div style={{position:'absolute', top:10, left:10, background: prop.badgeBg || 'white', color: prop.badgeColor || 'var(--ink)', borderRadius:'var(--r-full)', padding:'3px 10px', fontSize:11, fontWeight:600, boxShadow:'0 1px 4px rgba(0,0,0,0.12)'}}>
          {prop.badge}
        </div>
        {/* Heart */}
        <button onClick={e => {e.stopPropagation(); setSaved(!saved)}} style={{position:'absolute', top:10, right:10, background:'rgba(255,255,255,0.88)', border:'none', borderRadius:'50%', width:32, height:32, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer'}}>
          <Icon name={saved ? 'heart-filled' : 'heart'} size={15} color={saved ? 'var(--primary)' : 'var(--ink)'} />
        </button>
      </div>
      {/* Meta */}
      <div style={{padding:'12px 14px'}}>
        <div style={{display:'flex', justifyContent:'space-between', gap:8, alignItems:'flex-start'}}>
          <div style={{fontFamily:'var(--font-display)', fontSize:14, fontWeight:700, color:'var(--ink)', lineHeight:1.3}}>{prop.title}</div>
          <div style={{fontFamily:'var(--font-display)', fontSize:15, fontWeight:700, color:'var(--primary)', whiteSpace:'nowrap'}}>{prop.price}</div>
        </div>
        <div style={{fontSize:12, color:'var(--muted)', marginTop:4, display:'flex', alignItems:'center', gap:4}}>
          <Icon name="map-pin" size={11} color="var(--muted)" /> {prop.location}
        </div>
        <div style={{display:'flex', gap:12, marginTop:8}}>
          {prop.attrs.map((a,i) => <span key={i} style={{fontSize:11, color:'var(--muted)'}}>{a}</span>)}
        </div>
      </div>
    </div>
  );
};

/* ── Home Page ───────────────────────────────────────── */
const HomePage = ({ onNavigate }) => {
  const [searchVal, setSearchVal] = React.useState('');
  const properties = [
    { id:1, title:'Departamento Providencia', price:'$680.000/mes', location:'Providencia, Santiago', badge:'En arriendo', badgeBg:'#EBF4F5', badgeColor:'#2B6F72', attrs:['3 dorm', '2 baños', '72 m²'], color1:'#C4DCDD', color2:'#8FBFC2' },
    { id:2, title:'Casa Vitacura', price:'UF 7.200', location:'Vitacura, Santiago', badge:'En venta', badgeBg:'#2B6F72', badgeColor:'white', attrs:['4 dorm', '3 baños', '180 m²'], color1:'#D4C9B0', color2:'#B8A98A' },
    { id:3, title:'Depto. Ñuñoa', price:'$550.000/mes', location:'Ñuñoa, Santiago', badge:'Nuevo', badgeBg:'white', badgeColor:'var(--ink)', attrs:['2 dorm', '1 baño', '58 m²'], color1:'#B8C8C4', color2:'#8FA8A4' },
    { id:4, title:'Oficina Las Condes', price:'$420.000/mes', location:'Las Condes, Santiago', badge:'En arriendo', badgeBg:'#EBF4F5', badgeColor:'#2B6F72', attrs:['45 m²', '1 baño', 'Piso 3'], color1:'#C8C4B8', color2:'#A8A090' },
  ];
  const services = [
    { icon:'camera', title:'Fotografía HD', desc:'Imágenes profesionales que destacan cada espacio de tu propiedad' },
    { icon:'video', title:'Video & Tour 360°', desc:'Recorridos virtuales inmersivos para compradores remotos' },
    { icon:'home', title:'Home Staging', desc:'Preparamos tu inmueble para obtener el mejor precio posible' },
    { icon:'key', title:'Gestión sin preocupaciones', desc:'Nos encargamos de todo: contratos, arriendos, mantenciones' },
  ];
  return (
    <div>
      {/* Hero */}
      <div style={{background:`linear-gradient(160deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%)`, padding:'80px 32px', textAlign:'center', position:'relative', overflow:'hidden'}}>
        <div style={{position:'absolute', inset:0, opacity:0.08, backgroundImage:'radial-gradient(circle at 30% 50%, white 1px, transparent 1px), radial-gradient(circle at 70% 20%, white 1px, transparent 1px)', backgroundSize:'60px 60px'}}></div>
        <div style={{position:'relative', maxWidth:680, margin:'0 auto'}}>
          <div style={{fontFamily:'var(--font-serif)', fontSize:16, color:'var(--primary-muted)', marginBottom:16, letterSpacing:'0.04em'}}>Corredora Treffer</div>
          <h1 style={{fontFamily:'var(--font-display)', fontSize:56, fontWeight:800, color:'white', lineHeight:1.05, letterSpacing:'0.02em', textTransform:'uppercase', marginBottom:16}}>
            Saca lo mejor<br/>de tu inmueble
          </h1>
          <p style={{fontFamily:'var(--font-serif)', fontSize:22, color:'rgba(255,255,255,0.8)', marginBottom:40, lineHeight:1.4}}>
            Venta y arriendo con fotografía HD, video y home staging profesional
          </p>
          {/* Search Bar */}
          <div style={{background:'white', borderRadius:'var(--r-full)', padding:'10px 10px 10px 24px', display:'flex', alignItems:'center', gap:12, boxShadow:'0 8px 40px rgba(0,0,0,0.2)', maxWidth:560, margin:'0 auto'}}>
            <Icon name="search" size={18} color="var(--muted)" />
            <input value={searchVal} onChange={e => setSearchVal(e.target.value)} placeholder="Buscar por ciudad, comuna o dirección…" style={{flex:1, border:'none', outline:'none', fontFamily:'var(--font-body)', fontSize:15, color:'var(--ink)', background:'transparent'}} />
            <button onClick={() => onNavigate('listings')} style={{background:'var(--primary)', color:'white', border:'none', borderRadius:'var(--r-full)', padding:'11px 28px', fontFamily:'var(--font-body)', fontSize:15, fontWeight:500, cursor:'pointer'}}>
              Buscar
            </button>
          </div>
        </div>
      </div>

      {/* Category Pills */}
      <div style={{background:'white', borderBottom:`1px solid var(--hairline)`, padding:'16px 32px', display:'flex', gap:10, justifyContent:'center', overflowX:'auto'}}>
        {['Todos','Departamentos','Casas','Oficinas','Terrenos','En arriendo','En venta'].map((t,i) => (
          <button key={t} style={{borderRadius:'var(--r-full)', padding:'8px 18px', fontSize:13, fontWeight:500, border: i===0 ? '1.5px solid var(--primary)' : '1.5px solid var(--hairline)', background: i===0 ? 'var(--primary-subtle)' : 'white', color: i===0 ? 'var(--primary)' : 'var(--muted)', cursor:'pointer', whiteSpace:'nowrap', transition:'var(--transition)'}}>
            {t}
          </button>
        ))}
      </div>

      {/* Featured Listings */}
      <div style={{maxWidth:1200, margin:'0 auto', padding:'64px 32px', width:'100%', boxSizing:'border-box'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:32}}>
          <div>
            <div style={{fontFamily:'var(--font-body)', fontSize:11, fontWeight:700, letterSpacing:'0.12em', textTransform:'uppercase', color:'var(--muted)', marginBottom:6}}>Propiedades destacadas</div>
            <h2 style={{fontFamily:'var(--font-display)', fontSize:32, fontWeight:700, letterSpacing:'-0.02em', color:'var(--ink)'}}>Encuentra tu próximo hogar</h2>
          </div>
          <button onClick={() => onNavigate('listings')} style={{display:'flex', alignItems:'center', gap:6, background:'none', border:'none', fontSize:14, fontWeight:500, color:'var(--primary)', cursor:'pointer'}}>
            Ver todas <Icon name="arrow-right" size={15} color="var(--primary)" />
          </button>
        </div>
        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(220px, 1fr))', gap:20}}>
          {properties.map(p => <PropertyCard key={p.id} prop={p} onClick={() => onNavigate('detail', p)} />)}
        </div>
      </div>

      {/* Services Band */}
      <div style={{background:'var(--primary)', padding:'80px 32px'}}>
        <div style={{maxWidth:1200, margin:'0 auto', width:'100%', boxSizing:'border-box'}}>
          <div style={{textAlign:'center', marginBottom:48}}>
            <div style={{fontFamily:'var(--font-serif)', fontSize:16, color:'var(--primary-muted)', marginBottom:8}}>Nuestros servicios</div>
            <h2 style={{fontFamily:'var(--font-display)', fontSize:36, fontWeight:700, color:'white', letterSpacing:'-0.02em'}}>Todo lo que tu propiedad necesita</h2>
          </div>
          <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(200px, 1fr))', gap:24}}>
            {services.map(s => (
              <div key={s.title} style={{background:'rgba(255,255,255,0.1)', borderRadius:'var(--r-md)', padding:'28px 24px', backdropFilter:'blur(8px)', border:'1px solid rgba(255,255,255,0.15)'}}>
                <div style={{background:'rgba(255,255,255,0.15)', borderRadius:'var(--r-sm)', width:44, height:44, display:'flex', alignItems:'center', justifyContent:'center', marginBottom:16}}>
                  <Icon name={s.icon} size={20} color="white" />
                </div>
                <div style={{fontFamily:'var(--font-display)', fontSize:16, fontWeight:700, color:'white', marginBottom:8}}>{s.title}</div>
                <div style={{fontSize:13, color:'rgba(255,255,255,0.7)', lineHeight:1.55}}>{s.desc}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* CTA Band */}
      <div style={{background:'var(--canvas)', padding:'80px 32px', textAlign:'center'}}>
        <div style={{maxWidth:560, margin:'0 auto'}}>
          <div style={{fontFamily:'var(--font-serif)', fontSize:18, color:'var(--primary)', marginBottom:12}}>¿Eres propietario?</div>
          <h2 style={{fontFamily:'var(--font-display)', fontSize:36, fontWeight:700, letterSpacing:'-0.02em', color:'var(--ink)', marginBottom:16}}>Garantizamos buenos ingresos sin preocupaciones</h2>
          <p style={{fontSize:16, color:'var(--body)', lineHeight:1.6, marginBottom:32}}>Nos encargamos de publicar, mostrar y gestionar tu propiedad con fotografía profesional y home staging.</p>
          <div style={{display:'flex', gap:12, justifyContent:'center'}}>
            <button onClick={() => onNavigate('publish')} style={{background:'var(--primary)', color:'white', border:'none', borderRadius:'var(--r-sm)', padding:'14px 32px', fontFamily:'var(--font-body)', fontSize:16, fontWeight:500, cursor:'pointer'}}>
              Publicar mi propiedad
            </button>
            <button onClick={() => onNavigate('contact')} style={{background:'none', border:'1.5px solid var(--ink)', borderRadius:'var(--r-sm)', padding:'13px 28px', fontFamily:'var(--font-body)', fontSize:16, fontWeight:500, color:'var(--ink)', cursor:'pointer'}}>
              Hablar con un agente
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ── Listings Page ───────────────────────────────────── */
const ListingsPage = ({ onNavigate }) => {
  const [filter, setFilter] = React.useState('Todos');
  const properties = [
    { id:1, title:'Departamento Providencia', price:'$680.000/mes', location:'Providencia', badge:'En arriendo', badgeBg:'#EBF4F5', badgeColor:'#2B6F72', attrs:['3 dorm', '2 baños', '72 m²'], color1:'#C4DCDD', color2:'#8FBFC2' },
    { id:2, title:'Casa Vitacura', price:'UF 7.200', location:'Vitacura', badge:'En venta', badgeBg:'#2B6F72', badgeColor:'white', attrs:['4 dorm', '3 baños', '180 m²'], color1:'#D4C9B0', color2:'#B8A98A' },
    { id:3, title:'Depto. Ñuñoa', price:'$550.000/mes', location:'Ñuñoa', badge:'Nuevo', badgeBg:'white', badgeColor:'var(--ink)', attrs:['2 dorm', '1 baño', '58 m²'], color1:'#B8C8C4', color2:'#8FA8A4' },
    { id:4, title:'Oficina Las Condes', price:'$420.000/mes', location:'Las Condes', badge:'En arriendo', badgeBg:'#EBF4F5', badgeColor:'#2B6F72', attrs:['45 m²', '1 baño', 'Piso 3'], color1:'#C8C4B8', color2:'#A8A090' },
    { id:5, title:'Casa La Reina', price:'UF 5.800', location:'La Reina', badge:'En venta', badgeBg:'#2B6F72', badgeColor:'white', attrs:['3 dorm', '2 baños', '140 m²'], color1:'#CBBFA8', color2:'#A89880' },
    { id:6, title:'Depto. Miraflores', price:'$490.000/mes', location:'Santiago Centro', badge:'En arriendo', badgeBg:'#EBF4F5', badgeColor:'#2B6F72', attrs:['1 dorm', '1 baño', '42 m²'], color1:'#B4C4C8', color2:'#90A8AC' },
  ];
  const filters = ['Todos','En arriendo','En venta','Departamentos','Casas'];
  return (
    <div style={{maxWidth:1200, margin:'0 auto', padding:'40px 32px', width:'100%', boxSizing:'border-box'}}>
      <h1 style={{fontFamily:'var(--font-display)', fontSize:32, fontWeight:700, letterSpacing:'-0.02em', color:'var(--ink)', marginBottom:8}}>Propiedades disponibles</h1>
      <p style={{fontSize:15, color:'var(--muted)', marginBottom:28}}>{properties.length} propiedades encontradas en Santiago</p>
      {/* Filters */}
      <div style={{display:'flex', gap:8, marginBottom:32, flexWrap:'wrap'}}>
        {filters.map(f => (
          <button key={f} onClick={() => setFilter(f)} style={{borderRadius:'var(--r-full)', padding:'8px 18px', fontSize:13, fontWeight:500, border: filter===f ? '1.5px solid var(--primary)' : '1.5px solid var(--hairline)', background: filter===f ? 'var(--primary)' : 'white', color: filter===f ? 'white' : 'var(--muted)', cursor:'pointer', transition:'var(--transition)'}}>
            {f}
          </button>
        ))}
      </div>
      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(260px, 1fr))', gap:24}}>
        {properties.map(p => <PropertyCard key={p.id} prop={p} onClick={() => onNavigate('detail', p)} />)}
      </div>
    </div>
  );
};

/* ── Property Detail Page ────────────────────────────── */
const DetailPage = ({ prop, onNavigate }) => {

/* ── App Shell ───────────────────────────────────────── */
const App = () => {
  const [page, setPage] = React.useState('home');
  const [selectedProp, setSelectedProp] = React.useState(null);

  const navigate = (p, data) => {
    setPage(p);
    if (data) setSelectedProp(data);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  return (
    <div style={{minHeight:'100vh', display:'flex', flexDirection:'column'}}>
      <Nav onNavigate={navigate} currentPage={page} />
      <main style={{flex:1}}>
        {page === 'home'    && <HomePage onNavigate={navigate} />}
        {page === 'listings'&& <ListingsPage onNavigate={navigate} />}
        {page === 'detail'  && <DetailPage prop={selectedProp} onNavigate={navigate} />}
        {page === 'contact' && <ContactPage />}
        {page === 'publish' && <PublishPage />}
        {page === 'about'   && <ContactPage />}
      </main>
      <Footer onNavigate={navigate} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
